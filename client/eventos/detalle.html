<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Detalle del Evento | Catfeina</title>
    <link rel="stylesheet" href="/recursos/css/estilos-globales.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/recursos/js/tema-tailwind.js"></script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

<body class="bg-fondo-claro dark:bg-fondo-oscuro font-display text-texto-principal dark:text-gray-100 transition-colors duration-200 min-h-screen">
    <div id="nav-placeholder"></div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 pt-24 fade-in">
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12 mb-12">
            
            <!-- Representación visual del evento -->
            <div class="lg:col-span-7 flex flex-col gap-6">
                <div class="relative w-full aspect-video rounded-[2.5rem] overflow-hidden shadow-sm border border-gray-100 dark:border-white/5 bg-gray-50 dark:bg-white/5">
                    <img id="evento-imagen-hero" src="" class="w-full h-full object-cover" alt="Evento">
                    <div id="badge-precio-flotante" class="absolute top-6 right-6 px-5 py-2.5 bg-principal text-texto-principal font-black rounded-2xl shadow-xl text-base uppercase tracking-widest">--</div>
                </div>

                <section class="space-y-6">
                    <div class="inline-flex items-center gap-2 text-principal font-black text-[10px] uppercase tracking-[0.2em]">
                        <span class="material-symbols-outlined text-sm">description</span>
                        Sobre la experiencia
                    </div>
                    <div id="evento-descripcion" class="text-lg text-texto-secundario dark:text-gray-300 leading-relaxed font-medium">
                        Cargando...
                    </div>
                </section>

                <section id="seccion-requisitos" class="hidden p-8 rounded-3xl bg-principal/5 border border-principal/10">
                    <h3 class="text-xs font-black text-texto-principal dark:text-white uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                        <span class="material-symbols-outlined text-principal text-base">info</span> Importante
                    </h3>
                    <div id="evento-requisitos" class="text-sm text-texto-secundario dark:text-gray-400 leading-relaxed space-y-2"></div>
                </section>
            </div>

            <!-- Formulario de reserva e información técnica -->
            <div class="lg:col-span-5 flex flex-col gap-6">
                <div class="bg-white dark:bg-white/5 rounded-3xl p-7 shadow-sm border border-gray-100 dark:border-white/10 sticky top-24">
                    
                    <div class="mb-6">
                        <span id="evento-categoria" class="text-principal font-black text-[10px] uppercase tracking-widest mb-2 block">Categoría</span>
                        <h1 id="evento-titulo" class="text-3xl md:text-4xl font-black text-texto-principal dark:text-white tracking-tight leading-tight">Cargando...</h1>
                    </div>

                    <div class="grid grid-cols-1 gap-4 mb-8 border-y border-gray-100 dark:border-white/10 py-6">
                        <div class="flex items-center gap-4">
                            <div class="size-10 bg-gray-50 dark:bg-white/5 rounded-full flex items-center justify-center text-principal">
                                <span class="material-symbols-outlined">calendar_month</span>
                            </div>
                            <div>
                                <span class="block text-[10px] text-gray-400 uppercase font-bold">Fecha</span>
                                <span id="evento-fecha" class="font-bold text-sm">--</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="size-10 bg-gray-50 dark:bg-white/5 rounded-full flex items-center justify-center text-principal">
                                <span class="material-symbols-outlined">schedule</span>
                            </div>
                            <div>
                                <span class="block text-[10px] text-gray-400 uppercase font-bold">Hora</span>
                                <span id="evento-hora" class="font-bold text-sm">--</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="size-10 bg-gray-50 dark:bg-white/5 rounded-full flex items-center justify-center text-principal">
                                <span class="material-symbols-outlined">location_on</span>
                            </div>
                            <div>
                                <span class="block text-[10px] text-gray-400 uppercase font-bold">Lugar</span>
                                <span id="evento-ubicacion" class="font-bold text-sm">--</span>
                            </div>
                        </div>
                    </div>

                    <form id="form-inscripcion" class="space-y-5" novalidate>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-[9px] font-black uppercase tracking-widest text-gray-400 ml-1">Número de personas</label>
                            <input required name="num_personas" type="number" min="1" max="10" value="1"
                                class="w-full rounded-xl border-gray-100 bg-gray-50/50 p-3.5 text-sm font-bold focus:border-principal dark:bg-white/5 dark:text-white transition-all" />
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-[9px] font-black uppercase tracking-widest text-gray-400 ml-1">Observaciones</label>
                            <textarea name="observaciones" rows="2" 
                                class="w-full rounded-xl border-gray-100 bg-gray-50/50 p-3.5 text-sm font-bold focus:border-principal dark:bg-white/5 dark:text-white transition-all"
                                placeholder="Alergias o notas..."></textarea>
                        </div>
                        <button type="submit" id="btn-inscribirse"
                            class="w-full py-4 bg-principal text-[#181511] font-black rounded-xl shadow-lg shadow-principal/20 hover:scale-[1.02] transition-all text-sm uppercase tracking-widest mt-2">
                            RESERVAR PLAZA
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/components/loader.js"></script>
    <script src="detalle.js" type="module"></script>
</body>
</html>
