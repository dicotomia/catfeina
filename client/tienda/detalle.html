<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title id="meta-titulo">Cargando producto... | Catfeina</title>
    <link rel="stylesheet" href="/recursos/css/estilos-globales.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/recursos/js/tema-tailwind.js"></script>

    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="bg-fondo-claro dark:bg-fondo-oscuro font-display text-texto-principal dark:text-gray-100 min-h-screen flex flex-col">

    <div id="nav-placeholder"></div>

    <!-- Contenedor para notificaciones emergentes -->
    <div id="toast-container" class="fixed top-24 right-8 z-[200] flex flex-col gap-3 pointer-events-none"></div>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12 fade-in">
        
        <nav aria-label="Breadcrumb" class="flex mb-8 text-sm font-medium text-texto-secundario dark:text-gray-400">
            <ol class="flex items-center space-x-2">
                <li><a class="hover:text-principal transition-colors" href="/">Inicio</a></li>
                <li><span class="material-symbols-outlined text-base">chevron_right</span></li>
                <li><a class="hover:text-principal transition-colors" href="/tienda/">Tienda</a></li>
                <li><span class="material-symbols-outlined text-base">chevron_right</span></li>
                <li id="breadcrumb-nombre" class="text-texto-principal dark:text-white font-bold">Producto</li>
            </ol>
        </nav>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12">
            
            <!-- Galería de imágenes del producto -->
            <div class="lg:col-span-7 flex flex-col gap-4">
                <div class="w-full rounded-[2.5rem] overflow-hidden bg-gray-100 dark:bg-[#1a120b] shadow-sm border border-gray-100 dark:border-gray-800 h-[400px] flex items-center justify-center">
                    <img id="img-principal" src="/recursos/imagenes/logo.webp" class="max-w-full max-h-full object-contain transition-transform duration-700 hover:scale-105" alt="Producto">
                </div>
                <div id="galeria-thumbnails" class="flex gap-3 overflow-x-auto pb-2 hide-scrollbar">
                    <!-- Miniaturas generadas dinámicamente -->
                </div>
            </div>

            <!-- Información detallada y control de compra -->
            <div class="lg:col-span-5 flex flex-col gap-6">
                <div class="flex flex-col gap-3">
                    <span id="prod-categoria" class="w-fit px-3 py-1 bg-principal/10 text-principal text-[10px] font-black uppercase tracking-widest rounded-full">Categoría</span>
                    <h1 id="prod-nombre" class="text-3xl lg:text-4xl font-black text-texto-principal dark:text-white tracking-tight leading-tight">Nombre del Producto</h1>
                    <div id="prod-precio" class="text-2xl font-black text-principal">0.00 €</div>
                </div>

                <div class="prose prose-sm dark:prose-invert">
                    <p id="prod-descripcion" class="text-base text-texto-secundario dark:text-gray-400 leading-relaxed font-medium">
                        Cargando descripción...
                    </p>
                </div>

                <!-- Control de cantidades y botón de compra -->
                <div class="bg-white dark:bg-[#1a120b] rounded-3xl p-6 md:p-7 shadow-xl border border-gray-100 dark:border-gray-800 flex flex-col gap-5">
                    <div class="flex items-center gap-3">
                        <div class="flex items-center border-2 border-gray-100 dark:border-gray-800 rounded-xl overflow-hidden bg-gray-50 dark:bg-black/20 shrink-0">
                            <button id="btn-menos" class="p-3 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors"><span class="material-symbols-outlined text-sm">remove</span></button>
                            <span id="compra-cantidad" class="w-10 text-center font-black text-lg">1</span>
                            <button id="btn-mas" class="p-3 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors"><span class="material-symbols-outlined text-sm">add</span></button>
                        </div>
                        <button id="btn-anadir-detalle" class="flex-1 h-14 bg-principal text-texto-principal font-black text-sm rounded-xl hover:scale-[1.02] transition-all shadow-lg shadow-principal/20 flex items-center justify-center gap-2 uppercase tracking-widest">
                            AÑADIR AL CARRITO
                            <span class="material-symbols-outlined text-lg">add_shopping_cart</span>
                        </button>
                    </div>
                </div>

                <!-- Información de logística y seguridad -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-4 rounded-2xl bg-gray-50 dark:bg-white/5 border border-gray-100 dark:border-white/10 flex items-center gap-3">
                        <span class="material-symbols-outlined text-principal">local_shipping</span>
                        <span class="text-xs font-bold uppercase">Recogida en Local</span>
                    </div>
                    <div class="p-4 rounded-2xl bg-gray-50 dark:bg-white/5 border border-gray-100 dark:border-white/10 flex items-center gap-3">
                        <span class="material-symbols-outlined text-principal">verified_user</span>
                        <span class="text-xs font-bold uppercase">Pago Seguro</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/components/loader.js"></script>
    <script src="detalle.js" type="module"></script>
</body>
</html>
