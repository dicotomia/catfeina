<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Eventos | Catfeina</title>
    <link rel="preload" href="/recursos/fuentes/Waterlily.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/recursos/css/estilos-globales.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/recursos/js/tema-tailwind.js"></script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="bg-fondo-claro dark:bg-fondo-oscuro text-texto-principal dark:text-gray-100 font-display transition-colors duration-200">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">

        <div id="nav-placeholder"></div>

        <main class="flex-grow">
            <!-- Cabecera de la sección de eventos -->
            <header class="w-full bg-[#fdfaf7] dark:bg-[#150f0a] pt-16 pb-6 px-4 relative overflow-hidden text-center">
                <!-- Imagen de fondo decorativa -->
                <div class="absolute inset-0 opacity-20 pointer-events-none grayscale">
                    <img src="/recursos/imagenes/cabecera-eventos.webp" class="w-full h-full object-cover">
                </div>

                <div class="max-w-4xl mx-auto relative z-10 flex flex-col gap-2">
                    <h1 class="font-waterlily text-5xl md:text-7xl text-principal leading-none tracking-normal">
                        Momentos <span class="text-[#181511] dark:text-white italic">Miau</span>
                    </h1>
                    <p class="text-sm md:text-base text-texto-secundario dark:text-gray-400 font-medium max-w-xl mx-auto leading-relaxed">
                        Talleres, charlas y experiencias únicas diseñadas para disfrutar entre ronroneos.
                    </p>
                </div>
            </header>

            <!-- Filtros de búsqueda por categoría -->
            <section class="py-8 bg-white dark:bg-[#1a120b] border-y border-gray-100 dark:border-gray-800 sticky top-[80px] z-40 backdrop-blur-md bg-white/80 dark:bg-[#1a120b]/80">
                <div class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-6">
                    <h2 class="text-xl font-black uppercase tracking-widest text-principal">Explorar</h2>
                
                </div>
            </section>

            <!-- Catálogo dinámico de eventos -->
            <section class="py-16 max-w-6xl mx-auto px-4 md:px-10">
                <div id="contenedor-eventos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                    <!-- Contenido generado por JavaScript -->
                </div>
            </section>
        </main>

        <div id="footer-placeholder"></div>

        <script src="/components/loader.js"></script>
        <script src="eventos.js" type="module"></script>
    </div>
</body>
</html>
