<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Acceso - Catfeina</title>
    <link rel="icon" type="image/svg+xml" href="/recursos/imagenes/logo-flavicon.svg">
    
    <link rel="stylesheet" href="/recursos/css/estilos-globales.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/recursos/js/tema-tailwind.js"></script>

    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-login { animation: slideUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-white text-texto-principal font-display antialiased">
    
    <div id="nav-placeholder"></div>

    <main class="h-screen flex items-center justify-center pt-16 px-6">
        <div class="max-w-5xl w-full">
            
            <!-- Encabezado de la página de acceso -->
            <div class="text-center mb-6 animate-login">
                <h1 class="text-3xl font-black tracking-tighter uppercase">Bienvenido a la manada</h1>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mt-1">Acceso exclusivo para socios</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 animate-login" style="animation-delay: 0.1s;">
                
                <!-- Sección de inicio de sesión -->
                <div class="bg-[#fdfaf7] p-8 rounded-3xl border border-gray-100 flex flex-col justify-center">
                    <div class="flex items-center gap-2 mb-6">
                        <span class="material-symbols-outlined text-principal">login</span>
                        <h2 class="text-lg font-black uppercase tracking-tight">Entrar</h2>
                    </div>

                    <form id="form-login" class="space-y-3" novalidate>
                        <div>
                            <label class="text-[8px] font-black uppercase text-gray-400 ml-1">Email o Usuario</label>
                            <input id="login-identificador" name="identificador" type="text" placeholder="Tu email" class="w-full" autocomplete="username" required>
                        </div>
                        <div>
                            <div class="px-1 mb-1">
                                <label class="text-[8px] font-black uppercase text-gray-400">Contraseña</label>
                            </div>
                            <input id="login-password" name="password" type="password" placeholder="••••••••" class="w-full" autocomplete="current-password" required>
                        </div>
                        <button type="submit" class="w-full py-3 bg-principal text-texto-principal font-black text-[10px] uppercase tracking-widest rounded-xl shadow-lg shadow-principal/20 hover:scale-[1.02] transition-all mt-2 disabled:opacity-50 disabled:cursor-not-allowed">Iniciar Sesión</button>
                    </form>
                </div>

                <!-- Sección de registro de nueva cuenta -->
                <div class="bg-white p-8 rounded-3xl border border-gray-100 flex flex-col justify-center">
                    <div class="flex items-center gap-2 mb-6">
                        <span class="material-symbols-outlined text-gray-400">person_add</span>
                        <h2 class="text-lg font-black uppercase tracking-tight">Nueva Cuenta</h2>
                    </div>

                    <form id="form-registro" class="space-y-3" novalidate>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[8px] font-black uppercase text-gray-400 ml-1">Nombre</label>
                                <input id="reg-nombre" name="nombre" type="text" placeholder="Tu nombre" class="w-full" autocomplete="given-name" required>
                            </div>
                            <div>
                                <label class="text-[8px] font-black uppercase text-gray-400 ml-1">Apellidos</label>
                                <input id="reg-apellidos" name="apellidos" type="text" placeholder="Tus apellidos" class="w-full" autocomplete="family-name" required>
                            </div>
                        </div>
                        <div>
                            <label class="text-[8px] font-black uppercase text-gray-400 ml-1">Email</label>
                            <input id="reg-email" name="email" type="email" placeholder="ejemplo@correo.com" class="w-full" autocomplete="email" required>
                        </div>
                        <div>
                            <label class="text-[8px] font-black uppercase text-gray-400 ml-1">Contraseña</label>
                            <input id="reg-password" name="password" type="password" placeholder="••••••••" class="w-full" autocomplete="new-password" required>
                        </div>
                        <button type="submit" class="w-full py-3 bg-black text-white font-black text-[10px] uppercase tracking-widest rounded-xl shadow-xl hover:brightness-110 transition-all mt-2 disabled:opacity-50 disabled:cursor-not-allowed">Crear mi cuenta</button>
                    </form>
                </div>

            </div>
            
            <div class="text-center mt-6">
                <p class="text-[9px] font-bold text-gray-300 uppercase tracking-widest italic">Hecho con amor por la comunidad Catfeina</p>
            </div>
        </div>
    </main>

    <script src="/components/loader.js"></script>
    <script src="login.js" type="module"></script>
</body>
</html>
